<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhan Caster - System Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --slate-900: #0f172a;
            --gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.4);
            --blue-tech: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.4);
            --emerald: #10b981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --rose: #f43f5e;
            --rose-glow: rgba(244, 63, 94, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.4rem;
            margin-bottom: 4rem;
        }

        /* Container & Layout */
        .stage {
            position: relative;
            width: 1200px;
            height: 750px;
            /* border: 1px solid rgba(255,255,255,0.05); */
        }

        /* Nodes */
        .node {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--slate-900);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .node i {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        .node span {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .node .status {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 6px;
            font-weight: 400;
        }

        /* Specific Nodes Locations */
        #pi-brain {
            top: 275px;
            left: 475px;
            width: 250px;
            height: 250px;
            border-color: var(--blue-tech);
            box-shadow: 0 0 40px var(--blue-glow);
        }

        #api-source { top: 20px; left: 100px; }
        #local-disk { bottom: 20px; left: 100px; }
        #android-tv { top: 20px; right: 100px; }
        #nest-hub { bottom: 20px; right: 100px; }

        /* Icons */
        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            fill: currentColor;
        }

        /* Connections */
        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .link-path {
            stroke: rgba(255,255,255,0.05);
            stroke-width: 2;
            fill: none;
        }

        .pulse-path {
            stroke: transparent;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
        }

        /* Status Indicators on Nodes */
        .indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }

        .active-gold { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .active-blue { background: var(--blue-tech); box-shadow: 0 0 8px var(--blue-tech); }
        .active-emerald { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
        .active-rose { background: var(--rose); box-shadow: 0 0 8px var(--rose); }

        /* Animation States */
        @keyframes flowForward {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }

        .pulse-now {
            stroke-dasharray: 20, 180;
            animation: flowForward 1.5s linear infinite;
        }

        /* Status Label Overlay */
        .stage-label {
            position: absolute;
            bottom: -80px;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            font-weight: 300;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .visible { opacity: 1; }

        /* Timer Counter */
        #countdown-timer {
            position: absolute;
            top: 210px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Outfit', monospace;
            font-size: 1.6rem;
            color: var(--text-dim);
        }

        /* Screen Previews */
        .preview {
            width: 100px;
            height: 60px;
            margin-top: 8px;
            border-radius: 6px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .preview.tv-active { background: #000; color: #ef4444; border-color: #ef4444; }
        .preview.hub-active { background: var(--gold-glow); color: #fff; border-color: var(--gold); }

    </style>
</head>
<body>

    <h1>ADHAN CASTER PRO</h1>
    <div class="subtitle">AUTONOMOUS SYSTEM FLOW</div>

    <div id="countdown-timer">T-MINUS 05:00</div>

    <div class="stage">
        <!-- Lines -->
        <svg class="connections">
            <!-- PI TO API -->
            <path id="path-pi-api" class="link-path" d="M 475 400 Q 300 300 300 220" />
            <path id="pulse-pi-api" class="pulse-path" d="M 475 400 Q 300 300 300 220" />

            <!-- PI TO DISK -->
            <path id="path-pi-disk" class="link-path" d="M 475 400 Q 300 500 300 580" />
            <path id="pulse-pi-disk" class="pulse-path" d="M 475 400 Q 300 500 300 580" />

            <!-- PI TO TV -->
            <path id="path-pi-tv" class="link-path" d="M 725 400 Q 900 300 900 220" />
            <path id="pulse-pi-tv" class="pulse-path" d="M 725 400 Q 900 300 900 220" />

            <!-- PI TO HUB -->
            <path id="path-pi-hub" class="link-path" d="M 725 400 Q 900 500 900 580" />
            <path id="pulse-pi-hub" class="pulse-path" d="M 725 400 Q 900 500 900 580" />
        </svg>

        <!-- Node: API -->
        <div id="api-source" class="node">
            <div id="ind-api" class="indicator"></div>
            <svg class="icon" viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M11,17H13V15H11V17M11,13H13V7H11V13Z"/></svg>
            <span>ALADHAN API</span>
            <div class="status">Idle</div>
        </div>

        <!-- Node: Disk -->
        <div id="local-disk" class="node">
            <div id="ind-disk" class="indicator"></div>
            <svg class="icon" viewBox="0 0 24 24"><path d="M12,13A5,5 0 0,1 7,8A5,5 0 0,1 12,3A5,5 0 0,1 17,8A5,5 0 0,1 12,13M12,4.5C10.07,4.5 8.5,6.07 8.5,8C8.5,9.93 10.07,11.5 12,11.5C13.93,11.5 15.5,9.93 15.5,8C15.5,6.07 13.93,4.5 12,4.5M6,20L9,17L6,14V16.5C3.79,16.5 2,14.71 2,12.5C2,10.29 3.79,8.5 6,8.5V7C2.96,7 0.5,9.46 0.5,12.5C0.5,15.54 2.96,18 6,18V20.5L9,17.5L6,14.5M18,20.5L15,17.5L18,14.5V17C21.04,17 23.5,14.54 23.5,11.5C23.5,8.46 21.04,6 18,6V3.5L15,6.5L18,9.5V7C20.21,7 22,8.79 22,10.5C22,12.21 20.21,14 18,14V11.5L15,14.5L18,17.5V20.5H18.03Z"/></svg>
            <span>STORAGE</span>
            <div class="status">v2.0 Database</div>
        </div>

        <!-- Node: Raspberry Pi -->
        <div id="pi-brain" class="node">
            <div id="ind-pi" class="indicator active-blue"></div>
            <svg class="icon" style="color:var(--blue-tech)" viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M11,17H13V15H11V17M11,13H13V7H11V13Z"/></svg>
            <span style="color:var(--blue-tech)">CORE ENGINE</span>
            <div class="status">System Online</div>
        </div>

        <!-- Node: Android TV -->
        <div id="android-tv" class="node">
            <div id="ind-tv" class="indicator"></div>
            <svg class="icon" viewBox="0 0 24 24"><path d="M21,17H3V5H21M21,3H3A2,2 0 0,0 1,5V17A2,2 0 0,0 3,19H10V21H14V19H21A2,2 0 0,0 23,17V5A2,2 0 0,0 21,3Z"/></svg>
            <span>ANDROID TV</span>
            <div id="tv-status" class="status">Playing Netflix</div>
            <div id="tv-preview" class="preview">▶ PLAYING</div>
        </div>

        <!-- Node: Nest Hub -->
        <div id="nest-hub" class="node">
            <div id="ind-hub" class="indicator"></div>
            <svg class="icon" viewBox="0 0 24 24"><path d="M11,3L18,3.5L19,10H22V12H19.5L21,19H18L17,12H11V19H8L7,12H4.5V10H7L8,3.5L11,3M13,5V10H16.5L15.5,5H13M8.5,5L7.5,10H11V5H8.5Z"/></svg>
            <span>NEST HUB MAX</span>
            <div id="hub-status" class="status">Standby</div>
            <div id="hub-preview" class="preview">OFF</div>
        </div>

        <div id="stage-text" class="stage-label">Initialization</div>
    </div>

    <script>
        const stages = [
            { id: 'INIT', label: 'Booting System', duration: 3000 },
            { id: 'SCHEDULE', label: 'Fetching Schedule', duration: 4000 },
            { id: 'IDLE', label: 'Waiting for Prayer', duration: 5000 },
            { id: 'PREFLIGHT', label: 'Pre-flight Generation', duration: 6000 },
            { id: 'TRIGGER', label: 'Precision Trigger', duration: 4000 },
            { id: 'PLAYING', label: 'Adhan In Progress', duration: 8000 },
            { id: 'CLEANUP', label: 'System Recovery', duration: 4000 }
        ];

        let currentStageIdx = 0;
        const stageText = document.getElementById('stage-text');
        const timer = document.getElementById('countdown-timer');
        
        // Pulses
        const pulses = {
            api: document.getElementById('pulse-pi-api'),
            disk: document.getElementById('pulse-pi-disk'),
            tv: document.getElementById('pulse-pi-tv'),
            hub: document.getElementById('pulse-pi-hub')
        };

        function resetPulses() {
            Object.values(pulses).forEach(p => {
                p.classList.remove('pulse-now');
                p.style.stroke = 'transparent';
            });
        }

        function setPulse(name, color) {
            pulses[name].classList.add('pulse-now');
            pulses[name].style.stroke = color;
        }

        function setStatus(node, activeClass, text) {
            const ind = document.getElementById('ind-' + node);
            ind.className = 'indicator ' + activeClass;
            const status = document.querySelector(`#${node === 'pi' ? 'pi-brain' : node + '-source' || node} .status`);
            if (status) status.innerText = text;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function runCycle() {
            // Stage 1: INIT
            stageText.innerText = 'System Boot';
            stageText.classList.add('visible');
            setStatus('pi', 'active-blue', 'Cold Boot...');
            await sleep(2000);

            // Stage 2: SCHEDULE
            stageText.innerText = 'Auto-Scheduler';
            setPulse('api', 'var(--blue-tech)');
            setStatus('api', 'active-blue', 'Fetching...');
            await sleep(2000);
            setPulse('api', 'transparent');
            setPulse('disk', 'var(--gold)');
            setStatus('disk', 'active-gold', 'Caching JSON');
            await sleep(2000);
            resetPulses();

            // Stage 3: IDLE
            stageText.innerText = 'Monitoring System';
            timer.innerText = 'T-MINUS 05:00';
            setStatus('pi', 'active-blue', 'Next: Dhuhr');
            await sleep(3000);

            // Stage 4: PREFLIGHT
            stageText.innerText = 'T-5m: Pre-Flight';
            timer.innerText = 'T-MINUS 04:59';
            setPulse('disk', 'var(--blue-tech)');
            setStatus('pi', 'active-gold', 'Visual Gen...');
            await sleep(2000);
            setStatus('pi', 'active-gold', 'FFmpeg Encoding');
            await sleep(3000);
            setStatus('pi', 'active-blue', 'Ready');
            resetPulses();

            // Stage 5: TRIGGER
            stageText.innerText = 'Precision Trigger';
            timer.innerText = '00:00:00';
            timer.style.color = 'var(--gold)';
            
            // ADB PAUSE
            setPulse('tv', 'var(--rose)');
            document.getElementById('ind-tv').className = 'indicator active-rose';
            document.getElementById('tv-status').innerText = 'PAUSED (ADB)';
            document.getElementById('tv-preview').innerText = '|| PAUSED';
            document.getElementById('tv-preview').classList.add('tv-active');
            
            await sleep(1500);
            
            // CAST
            setPulse('hub', 'var(--gold)');
            document.getElementById('ind-hub').className = 'indicator active-gold';
            document.getElementById('hub-status').innerText = 'CASTING ADHAN';
            document.getElementById('hub-preview').innerText = '🕌 ADHAN';
            document.getElementById('hub-preview').classList.add('hub-active');
            
            await sleep(4000);

            // Stage 6: PLAYING
            stageText.innerText = 'Watchdog Active';
            resetPulses();
            // Polling pulses
            for(let i=0; i<3; i++) {
                setPulse('hub', 'rgba(255,255,255,0.2)');
                await sleep(1000);
                resetPulses();
                await sleep(1000);
            }

            // Stage 7: CLEANUP
            stageText.innerText = 'Auto-Resume';
            document.getElementById('hub-status').innerText = 'Finished';
            document.getElementById('hub-preview').innerText = 'OFF';
            document.getElementById('hub-preview').classList.remove('hub-active');
            
            setPulse('tv', 'var(--emerald)');
            document.getElementById('ind-tv').className = 'indicator active-emerald';
            document.getElementById('tv-status').innerText = 'RESUMED (ADB)';
            document.getElementById('tv-preview').innerText = '▶ PLAYING';
            document.getElementById('tv-preview').classList.remove('tv-active');
            
            await sleep(3000);
            
            // Restart loop
            location.reload();
        }

        window.onload = runCycle;
    </script>
</body>
</html>
